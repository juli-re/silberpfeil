[agent]
  interval = "100ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "100ms"
  flush_jitter = "0s"
  omit_hostname = true

[[inputs.socket_listener]]
  service_address = "udp4://:8092"
  data_format = "json"
  name_override = "data"

[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "admin"
  organization = "telemetry"
  bucket = "data"
